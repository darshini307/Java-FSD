<!DOCTYPE html>
<html>
    <head>
        <title>Train Seat Calculator</title>
        
    </head>
    <body>
        <header>
            <h1>Train Seat Calculator</h1>
        </header>
        <br>
       <div class="container">
       <div>
        <label>Seat Number</label>
       <input type="number" id="seat" placeholder="Enter your seat number">
       </div>
       <div>
        <label>Class Number</label>
       <input type="number" id="classNumber" placeholder="Enter 3/2">
       </div>
       <div><button onclick="calculate()">Calculate</button></div>
       <div><h2 id="result"></h2></div>
       </div>
        <script >
            function calculate(){
                let n = document.getElementById("seat").value;
                let classNum = document.getElementById("classNumber").value;
                if(classNum==2){
                    twoAC(n);
                }
                else{
                    threeAC(n);
                }
            }
            function threeAC(n){
                let res = n%8;
                if(res===1 || res===4){
                    document.getElementById("result").textContent="lower";
                }
                else if(res===5 || res===2){
                    document.getElementById("result").textContent="Middle";
                }
                else if(res===3 || res===6){
                    document.getElementById("result").textContent="Upper";
                }
                else if(res==7){
                    document.getElementById("result").textContent="Side Lower";
                }
                else if(res===0){
                    document.getElementById("result").textContent="Side Upper";
                }
                else{
                    document.getElementById("result").textContent="Not Valid";
                }
            }
            function twoAC(n){
                let res = n%6;
                if(res===1 || res===3){
                    document.getElementById("result").textContent="Lower";
                }
                else if(res===2 || res===4){
                    document.getElementById("result").textContent="Upper";
                }
                else if(res==5){
                    document.getElementById("result").textContent="Side Lower";
                }
                else if(res===0){
                    document.getElementById("result").textContent="Side Upper";
                }
                else{
                    document.getElementById("result").textContent="Not Valid";
                }
            }
        </script>
        <style>
            body{
                background-color: sandybrown;
            }
            header{
                background-color: bisque;
                color: black;
                text-align: center;
                justify-content: center;
                
                padding: 15px;
            }
            .container{
                display: grid;
                grid-template-columns: auto;
                background-color: whitesmoke;
                justify-content: center;
                place-content: center;
                padding: 10px;
                width: fit-content;
                height: auto;
                border-radius: 5px;
            }
            .container div{
                display: grid;
                grid-template-columns: auto;
                padding :5px;

            }
            .container input{
                padding: 5px;
            }
            .container button{
                padding: 10px;
                border-radius: 5px;
                background-color: brown;
                color: white;
            }
        </style>
    </body>
</html>
