<!DOCTYPE html>
<html>
    <head>
        <title>Sum of Digits</title>
    </head>
    <body>
        <h1>Sum of Digits - Odd/Even</h1>
        <input type="number" id="num1" placeholder="Enter a number">
        <input type="number" id="num2" placeholder="Enter a number">
        <button onclick="addTwoNumbers()">Result</button>
        <h2 id="result"></h2>
        <script>
            function addTwoNumbers(){
                let n1= document.getElementById("num1").value;
                let n2= document.getElementById("num2").value;
                let sum = Number(n1)+Number(n2);
                let sumOfDigits = 0;
                while(sum > 0){
                    sumOfDigits += sum%10;
                    sum = parseInt(sum/10);
                }

                if(sumOfDigits%2==0){
                    document.getElementById("result").textContent="Even";
                }
                else{
                    document.getElementById("result").textContent="odd";
                }
                
            }
        </script>
    </body>
</html>
